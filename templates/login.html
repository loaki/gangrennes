<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }} - Login</title>
    {% include "style.html" %}
</head>

<body>
    <div class="shell">
        <header class="site-header">
            <a href="/" aria-label="Home">
                <img class="site-logo" src="/assets/gangrennes.png" alt="Gangrennes">
            </a>
            <nav class="site-nav" aria-label="Primary">
                <a class="site-link active" href="/login?tab={{ active_tab }}">login</a>
            </nav>
        </header>

        <nav class="tabs">
            <a class='tab{% if active_tab == "login" %} active{% endif %}' data-tab-color="login"
                href="/login?tab=login">Login</a>
            <a class='tab{% if active_tab == "register" %} active{% endif %}' data-tab-color="register"
                href="/login?tab=register">Register</a>
        </nav>

        <main class="panel stack with-site-header">
            {% if error_message.is_some() %}
            <p class="notice">{{ error_message.as_ref().unwrap() }}</p>
            {% endif %}

            {% if active_tab == "login" %}
            <form class="grid" method="post" action="/login">
                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" name="username" autocomplete="username" required minlength="3" maxlength="32">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required
                        minlength="8" maxlength="128">
                </div>
                <button type="submit">Login</button>
            </form>
            {% else %}
            <form class="grid" method="post" action="/register">
                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" name="username" autocomplete="username" required minlength="3" maxlength="32">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" required
                        minlength="8" maxlength="128">
                </div>
                <button type="submit">Register</button>
            </form>
            {% endif %}
        </main>
    </div>
</body>

</html>
