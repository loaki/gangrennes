<style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap');

    :root {
        color-scheme: dark;
        --bg-light-blue: #a8d8ff;
        --black: #1a1a1a;
        --ink: #f5f4f2;
        --muted: #b2b0ab;
        --border: #4f4a42;
        --line: #5b554b;
        --paper: #221f1b;
        --surface: #1b1815;
        --elevated: #2a2520;
        --accent: #6ea27b;
        --accent-red: #bb5446;
        --brass-1: #e7c86d;
        --brass-2: #c8963d;
        --copper-1: #d07b57;
        --copper-2: #8b412b;
        --light-purple: #2f2a38;
        --light-pink: #3a2a33;
        --light-red: #432927;
        --light-yellow: #3f3424;
        --light-green: #243428;
    }

    * {
        box-sizing: border-box;
    }

    html,
    body {
        margin: 0;
        padding: 0;
        min-height: 100%;
    }

    html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
    }

    body {
        font-family: 'Balboa', 'Instrument Sans', 'Segoe UI', sans-serif;
        background-image: linear-gradient(180deg, rgba(0, 0, 0, 0.16), rgba(0, 0, 0, 0.58)),
            url('/assets/background-mobile.webp');
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        color: var(--ink);
    }

    @media (min-width: 901px) {
        body {
            background-image: linear-gradient(180deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.5)),
                url('/assets/background-desktop.webp');
        }
    }

    a {
        color: inherit;
        text-decoration: none;
    }

    .shell {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    .topbar {
        background: var(--black);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        padding: 12px 16px;
        width: 100%;
        position: relative;
        min-height: 56px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
    }

    .site-logo {
        width: clamp(120px, 16vw, 220px);
        max-width: 45vw;
        height: auto;
        display: block;
    }

    .site-nav {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 14px;
        flex-wrap: wrap;
    }

    .site-link {
        color: var(--ink);
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: lowercase;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
        opacity: 0.9;
    }

    .site-link:hover,
    .site-link:focus-visible {
        opacity: 1;
        outline: none;
    }

    .site-link.active {
        text-decoration: underline;
        text-underline-offset: 4px;
    }

    .panel.with-site-header {
        padding-top: 96px;
    }

    .brand {
        font-family: 'Fraunces', serif;
        font-size: 18px;
        font-weight: 700;
        color: var(--bg-light-blue);
        letter-spacing: 0.08em;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        pointer-events: none;
    }

    .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-left: auto;
        width: 34px;
        height: 34px;
        padding: 0;
        cursor: pointer;
        background: linear-gradient(145deg, var(--brass-1), var(--brass-2));
        color: #1d140b;
        border: 1px solid rgba(26, 15, 8, 0.35);
        border-radius: 999px;
        box-shadow: 0 2px 8px rgba(120, 74, 30, 0.22);
    }

    .button:hover {
        border-color: rgba(26, 15, 8, 0.35);
        filter: none;
        box-shadow: 0 2px 8px rgba(120, 74, 30, 0.22);
    }

    .button .icon {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .tabs {
        display: flex;
        gap: 0;
        width: 100%;
        background: rgba(16, 14, 13, 0.62);
        backdrop-filter: blur(4px);
    }

    .tabs-row {
        display: flex;
        gap: 0;
        width: 100%;
    }

    .tab {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 8px;
        cursor: pointer;
        background: transparent;
        border: none;
        color: var(--ink);
        font-weight: 500;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: none;
    }

    .tab:hover {
        filter: brightness(1.07);
    }

    .tab.active {
        font-weight: 700;
    }

    .tab[data-tab-color="login"] {
        background: var(--light-purple);
    }

    .tab[data-tab-color="register"] {
        background: var(--light-pink);
    }

    .tab[data-tab-color="pinned"] {
        background: var(--light-red);
    }

    .tab[data-tab-color="new"] {
        background: var(--light-yellow);
    }

    .tab[data-tab-color="calendar"] {
        background: var(--light-green);
    }

    .panel {
        flex: 1;
        padding: 16px;
        width: min(980px, 100%);
        margin: 0 auto;
    }

    /* Form elements */
    select,
    textarea,
    input[type="text"],
    input[type="password"],
    input[type="email"],
    button[type="submit"] {
        border: 1px solid var(--border);
        border-radius: 4px;
        background: #222;
        color: var(--ink);
        padding: 10px 12px;
        font-size: 14px;
        font-family: inherit;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"],
    textarea {
        width: 100%;
    }

    textarea {
        resize: vertical;
        min-height: 80px;
    }

    button[type="submit"] {
        background: linear-gradient(145deg, var(--copper-1), var(--copper-2));
        color: #fff4eb;
        cursor: pointer;
        font-weight: 700;
        border: 1px solid rgba(31, 12, 8, 0.45);
        padding: 12px 20px;
        width: 100%;
        border-radius: 14px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        box-shadow: 0 6px 16px rgba(74, 23, 12, 0.35);
        transition: none;
    }

    button[type="submit"]:hover {
        filter: none;
        box-shadow: 0 6px 16px rgba(74, 23, 12, 0.35);
    }

    .field {
        margin-bottom: 14px;
    }

    .field label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    .grid {
        display: flex;
        flex-direction: column;
        gap: 0;
    }

    .stack {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .small {
        font-size: 12px;
        color: var(--muted);
    }

    /* Mobile first - base is already mobile */
    @media (min-width: 640px) {
        .shell {
            max-width: 100%;
        }

        .tabs {
            flex-direction: row;
        }

        .panel {
            padding: 24px;
        }

        .panel.with-site-header {
            padding-top: 104px;
        }
    }

    @media (max-width: 900px) {

        input[type="text"],
        input[type="password"],
        input[type="email"],
        textarea,
        select,
        button[type="submit"] {
            font-size: 16px;
        }
    }

    .grid {
        display: grid;
        gap: 12px;
    }

    .field {
        display: grid;
        gap: 6px;
    }

    label {
        font-size: 13px;
        color: var(--muted);
    }

    input {
        width: 100%;
        padding: 11px 13px;
    }

    select {
        min-height: 42px;
        padding: 0 12px;
    }

    textarea {
        width: 100%;
        min-height: 120px;
        padding: 12px;
        border-radius: 12px;
        resize: vertical;
    }

    .notice {
        margin: 0 0 12px;
        color: #ff8b7f;
    }

    .small {
        color: var(--muted);
        line-height: 1.5;
    }

    h1,
    h2,
    h3 {
        font-family: 'Balboa', 'Fraunces', serif;
        font-weight: 600;
        letter-spacing: 0.01em;
    }

    .stack {
        display: grid;
        gap: 10px;
    }

    .tabs-row {
        display: flex;
        gap: 0;
        flex-wrap: wrap;
    }

    .subtle {
        color: var(--muted);
        font-size: 14px;
    }

    .symbol-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        width: 100%;
    }

    .controls {
        flex: 1 1 auto;
        align-items: center;
    }

    .controls button[type="submit"].control-submit {
        width: 32px;
        height: 32px;
        padding: 0;
        border: 1px solid rgba(26, 15, 8, 0.42);
        border-radius: 999px;
        background: linear-gradient(145deg, var(--brass-1), var(--brass-2));
        color: #1d140b;
        margin-left: 2px;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(120, 74, 30, 0.2);
    }

    .icon-dropdown {
        position: relative;
    }

    .icon-dropdown>summary {
        list-style: none;
        cursor: pointer;
    }

    .icon-dropdown>summary::-webkit-details-marker {
        display: none;
    }

    .control-icon {
        width: 32px;
        height: 32px;
        padding: 0;
    }

    .control-icon .icon,
    .control-submit .icon {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .dropdown-panel {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        z-index: 10;
        min-width: 170px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: #27231e;
        border-radius: 14px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.42);
    }

    .dropdown-panel select {
        width: 100%;
        min-height: 36px;
    }

    .create-toggle-wrap {
        margin-left: auto;
    }

    .create-toggle {
        display: grid;
        justify-items: end;
    }

    .create-toggle>summary {
        list-style: none;
        user-select: none;
    }

    .create-toggle>summary::-webkit-details-marker {
        display: none;
    }

    .create-panel {
        margin-top: 12px;
        width: min(640px, 100%);
        padding: 14px 0 0;
        border-top: 1px solid rgba(255, 255, 255, 0.24);
    }

    .symbol-box {
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .symbol {
        width: 32px;
        height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(26, 15, 8, 0.42);
        border-radius: 999px;
        background: linear-gradient(145deg, var(--brass-1), var(--brass-2));
        color: #1d140b;
        font-weight: 700;
        box-shadow: 0 2px 8px rgba(120, 74, 30, 0.2);
    }

    .symbol-add {
        width: 36px;
        height: 36px;
        padding: 0;
        font-size: 22px;
        line-height: 1;
    }

    .date-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
    }

    .post-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
    }

    .posts-feed {
        gap: 0;
    }

    .post-item {
        padding: 18px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        gap: 10px;
    }

    .post-item:last-child {
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .post-title-row {
        align-items: baseline;
    }

    .post-title {
        margin: 0;
        font-size: clamp(22px, 2.8vw, 32px);
        line-height: 1.35;
        font-weight: 500;
        letter-spacing: 0.01em;
    }

    .post-meta {
        margin: 0;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .post-body {
        display: block;
    }

    .post-body.has-image {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 2fr);
        gap: 14px;
        align-items: start;
    }

    .post-description {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.65;
        font-size: 15px;
        color: #ece9e3;
    }

    .post-image {
        width: 100%;
        max-width: 100%;
        max-height: 260px;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
    }

    @media (max-width: 640px) {
        .post-body.has-image {
            grid-template-columns: 1fr;
        }

        .post-image {
            max-height: 220px;
        }
    }

    .pill {
        padding: 0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
    }

    .pill-on {
        color: #7bde96;
    }

    .reaction-row {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .reaction-button {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        border: 1px solid rgba(26, 15, 8, 0.42);
        background: linear-gradient(145deg, var(--brass-1), var(--brass-2));
        padding: 0;
        line-height: 1;
        color: #1d140b;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(120, 74, 30, 0.2);
        transition: none;
    }

    .reaction-button.active {
        color: #fff;
    }

    .reaction-button.reaction-pin.active,
    .reaction-button.reaction-not-going.active {
        background: linear-gradient(145deg, #cc5d4c, var(--accent-red));
        border-color: #d47264;
        color: #fff3ef;
    }

    .reaction-button.reaction-going.active {
        background: linear-gradient(145deg, #86b994, var(--accent));
        border-color: #95c9a2;
        color: #0f2215;
    }

    .reaction-button:hover {
        filter: none;
        box-shadow: 0 2px 8px rgba(120, 74, 30, 0.2);
    }

    .reaction-button .icon {
        width: 15px;
        height: 15px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }
</style>
