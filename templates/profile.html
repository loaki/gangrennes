<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }} - Profile</title>
    {% include "style.html" %}
</head>

<body>
    <div class="shell">
        <header class="site-header">
            <a href="/" aria-label="Home">
                <img class="site-logo" src="/assets/gangrennes.png" alt="Gangrennes">
            </a>
            <nav class="site-nav" aria-label="Primary">
                <a class="site-link" href="/pinned">pinned</a>
                <a class="site-link" href="/new">new</a>
                <a class="site-link" href="/calendar">calendar</a>
                <a class="site-link active" href="/profile">profile</a>
            </nav>
        </header>

        <main class="panel stack with-site-header">
            <div>
                <h1 style="margin:0 0 8px;">Profile</h1>
                <p class="small" style="margin:0;">Signed in as <strong>{{ username }}</strong>.</p>
            </div>

            <form method="post" action="/logout">
                <button type="submit">Logout</button>
            </form>
        </main>
    </div>
</body>

</html>
