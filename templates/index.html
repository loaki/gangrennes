<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <style>
        :root {
            --surface: rgba(10, 14, 18, 0.72);
            --surface-strong: rgba(10, 14, 18, 0.9);
            --text: #f2f5f7;
            --muted: #b8c2ca;
            --line: rgba(255, 255, 255, 0.14);
            --accent: #f3b44f;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            color: var(--text);
            font-family: "Balboa", "Segoe UI", "Noto Sans", sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: linear-gradient(180deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.5)),
                url('/assets/background-desktop.webp');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 900px) {
            body {
                background-image: linear-gradient(180deg, rgba(0, 0, 0, 0.16), rgba(0, 0, 0, 0.58)),
                    url('/assets/background-mobile.webp');
            }
        }

        .top-left {
            position: fixed;
            top: 1rem;
            left: 1rem;
            right: 1rem;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
        }

        .brand-logo {
            width: clamp(120px, 16vw, 220px);
            max-width: 45vw;
            height: auto;
            display: block;
        }

        .login-link {
            align-self: center;
            color: var(--text);
            text-decoration: none;
            padding: 0.2rem 0;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: lowercase;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            transition: opacity 0.16s ease, transform 0.16s ease;
        }

        .login-link:hover,
        .login-link:focus-visible {
            opacity: 0.8;
            transform: translateY(-1px);
            outline: none;
        }

        .audio-shell {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: fit-content;
            padding: 0;
            display: block;
            z-index: 3;
            pointer-events: none;
        }

        .audio-title {
            position: absolute;
            left: 50%;
            bottom: calc(100% + 0.55rem);
            transform: translateX(-50%);
            font-size: 0.95rem;
            color: var(--text);
            max-width: min(70ch, calc(100vw - 2rem));
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            text-align: center;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
        }

        .controls {
            display: flex;
            gap: 1.35rem;
            flex-shrink: 0;
        }

        .control-button {
            border: 0;
            background: transparent;
            color: var(--text);
            border-radius: 0.35rem;
            width: 80px;
            height: 80px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0.9;
            pointer-events: auto;
        }

        .control-button:hover,
        .control-button:focus-visible {
            outline: none;
            opacity: 1;
            transform: translateY(-1px);
        }

        .control-icon {
            width: 80px;
            height: 80px;
            display: block;
        }

        #yt-hidden-player {
            position: fixed;
            left: -9999px;
            top: -9999px;
            width: 1px;
            height: 1px;
            overflow: hidden;
            pointer-events: none;
            opacity: 0;
        }

        .modal {
            border: 0;
            padding: 0;
            background: transparent;
            width: min(460px, calc(100vw - 1rem));
            max-height: 90vh;
        }

        .modal::backdrop {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
        }

        .modal-card {
            background: rgba(14, 20, 25, 0.96);
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 0.95rem;
            padding: 0.95rem;
            display: grid;
            gap: 0.8rem;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--line);
            color: var(--text);
            border-radius: 0.45rem;
            width: 2rem;
            height: 2rem;
            cursor: pointer;
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .tab-btn {
            border: 1px solid var(--line);
            border-radius: 0.55rem;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            padding: 0.5rem;
            cursor: pointer;
            font-weight: 600;
        }

        .tab-btn.active {
            border-color: color-mix(in srgb, var(--accent) 64%, var(--line));
            background: color-mix(in srgb, var(--accent) 22%, transparent);
        }

        .auth-panel {
            display: none;
        }

        .auth-panel.active {
            display: block;
        }

        form {
            display: grid;
            gap: 0.65rem;
        }

        label {
            font-size: 0.83rem;
            color: var(--muted);
        }

        input {
            width: 100%;
            margin-top: 0.25rem;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 0.5rem;
            padding: 0.58rem 0.62rem;
        }

        .submit {
            border: 1px solid color-mix(in srgb, var(--accent) 60%, var(--line));
            background: color-mix(in srgb, var(--accent) 26%, transparent);
            color: var(--text);
            border-radius: 0.55rem;
            padding: 0.56rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header class="top-left">
        <img class="brand-logo" src="/assets/gangrennes.png" alt="Gangrennes">
        <a href="#" class="login-link" id="open-auth">login</a>
    </header>

    <section class="audio-shell" aria-label="Playlist player">
        <div class="audio-title" id="audio-title"></div>
        <div class="controls" aria-label="Player controls">
            <button type="button" class="control-button" id="prev" aria-label="Previous">
                <img class="control-icon" src="/assets/prev.svg" alt="Previous">
            </button>
            <button type="button" class="control-button primary" id="toggle" aria-label="Play or pause">
                <img class="control-icon" id="toggle-icon" src="/assets/play.svg" alt="Play or pause">
            </button>
            <button type="button" class="control-button" id="next" aria-label="Next">
                <img class="control-icon" src="/assets/next.svg" alt="Next">
            </button>
        </div>
    </section>

    <div id="yt-hidden-player" aria-hidden="true"></div>

    <dialog id="auth-modal" class="modal" aria-label="Authentication">
        <div class="modal-card">
            <div class="modal-header">
                <strong>Account</strong>
                <button type="button" class="close" id="close-auth" aria-label="Close">x</button>
            </div>

            <div class="tabs" role="tablist" aria-label="Authentication tabs">
                <button type="button" class="tab-btn active" id="tab-login" role="tab"
                    aria-selected="true">Login</button>
                <button type="button" class="tab-btn" id="tab-register" role="tab"
                    aria-selected="false">Register</button>
            </div>

            {% if error_message.is_some() %}
            <p style="margin:0;color:#ffaea6;font-size:0.9rem;">{{ error_message.as_ref().unwrap() }}</p>
            {% endif %}

            <section class="auth-panel active" id="panel-login" role="tabpanel">
                <form method="post" action="/login">
                    <label>Username
                        <input name="username" autocomplete="username" required minlength="3" maxlength="32">
                    </label>
                    <label>Password
                        <input name="password" type="password" autocomplete="current-password" required minlength="8"
                            maxlength="128">
                    </label>
                    <button class="submit" type="submit">Login</button>
                </form>
            </section>

            <section class="auth-panel" id="panel-register" role="tabpanel">
                <form method="post" action="/register">
                    <label>Username
                        <input name="username" autocomplete="username" required minlength="3" maxlength="32">
                    </label>
                    <label>Password
                        <input name="password" type="password" autocomplete="new-password" required minlength="8"
                            maxlength="128">
                    </label>
                    <button class="submit" type="submit">Register</button>
                </form>
            </section>
        </div>
    </dialog>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const authModal = document.getElementById('auth-modal');
        const openAuth = document.getElementById('open-auth');
        const closeAuth = document.getElementById('close-auth');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const panelLogin = document.getElementById('panel-login');
        const panelRegister = document.getElementById('panel-register');
        const initialTab = '{{ auth_tab }}';
        const openAuthOnLoad = {% if open_auth_modal %}true{% else %} false{% endif %};

        function setTab(mode) {
            const loginActive = mode === 'login';
            tabLogin.classList.toggle('active', loginActive);
            tabRegister.classList.toggle('active', !loginActive);
            tabLogin.setAttribute('aria-selected', loginActive ? 'true' : 'false');
            tabRegister.setAttribute('aria-selected', !loginActive ? 'true' : 'false');
            panelLogin.classList.toggle('active', loginActive);
            panelRegister.classList.toggle('active', !loginActive);
        }

        openAuth.addEventListener('click', (event) => {
            event.preventDefault();
            authModal.showModal();
            setTab('login');
        });

        closeAuth.addEventListener('click', () => authModal.close());
        tabLogin.addEventListener('click', () => setTab('login'));
        tabRegister.addEventListener('click', () => setTab('register'));
        authModal.addEventListener('click', (event) => {
            const rect = authModal.getBoundingClientRect();
            const inDialog =
                event.clientX >= rect.left &&
                event.clientX <= rect.right &&
                event.clientY >= rect.top &&
                event.clientY <= rect.bottom;
            if (!inDialog) {
                authModal.close();
            }
        });

        if (openAuthOnLoad) {
            setTab(initialTab === 'register' ? 'register' : 'login');
            authModal.showModal();
        }

        const titleEl = document.getElementById('audio-title');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');
        const toggleBtn = document.getElementById('toggle');
        const toggleIcon = document.getElementById('toggle-icon');

        let player = null;
        let playerReady = false;

        function withPlayer(action) {
            if (!playerReady || !player) {
                return;
            }
            action(player);
        }

        function refreshTitle() {
            if (!player || typeof player.getVideoData !== 'function') {
                return;
            }
            const data = player.getVideoData();
            if (data && data.title) {
                titleEl.textContent = data.title;
            }
        }

        window.onYouTubeIframeAPIReady = function () {
            player = new YT.Player('yt-hidden-player', {
                height: '0',
                width: '0',
                playerVars: {
                    autoplay: 0,
                    controls: 0,
                    disablekb: 1,
                    fs: 0,
                    modestbranding: 1,
                    rel: 0,
                    iv_load_policy: 3,
                    listType: 'playlist',
                    list: 'PLIcPg7nnSLAGvMMEfpJ-lecwqOWFAUrf5',
                },
                events: {
                    onReady: () => {
                        playerReady = true;
                        titleEl.textContent = '';
                    },
                    onStateChange: (event) => {
                        if (event.data === YT.PlayerState.PLAYING) {
                            toggleIcon.src = '/assets/pause.svg';
                            refreshTitle();
                        }
                        if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                            toggleIcon.src = '/assets/play.svg';
                            titleEl.textContent = '';
                        }
                    },
                },
            });
        };

        toggleBtn.addEventListener('click', () => {
            withPlayer((ytPlayer) => {
                const state = ytPlayer.getPlayerState();
                if (state === YT.PlayerState.PLAYING) {
                    ytPlayer.pauseVideo();
                } else {
                    ytPlayer.playVideo();
                    refreshTitle();
                }
            });
        });

        prevBtn.addEventListener('click', () => {
            withPlayer((ytPlayer) => {
                ytPlayer.previousVideo();
                ytPlayer.playVideo();
                refreshTitle();
            });
        });

        nextBtn.addEventListener('click', () => {
            withPlayer((ytPlayer) => {
                ytPlayer.nextVideo();
                ytPlayer.playVideo();
                refreshTitle();
            });
        });
    </script>
</body>

</html>
