services:
  app:
    build:
      context: .
    environment:
      BIND_ADDR: 0.0.0.0:3000
      DATABASE_URL: sqlite:///app/data/gangrennes.sqlite3
      COOKIE_SECURE: "false"
      SESSION_TTL_SECONDS: "86400"
      RUST_LOG: info
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
