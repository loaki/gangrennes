<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal Board</title>
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <button id="editToggle" class="edit-toggle" aria-pressed="false">Edit</button>

    <div id="toolbar" class="toolbar hidden" role="toolbar" aria-label="Editing tools">
        <button data-tool="move" class="tool-btn active">Move</button>
        <button data-tool="text" class="tool-btn">Text</button>
        <button data-tool="draw" class="tool-btn">Draw</button>
        <button data-tool="image" class="tool-btn">Image/GIF</button>
        <button data-tool="video" class="tool-btn">Video</button>

        <div id="drawControls" class="tool-group" aria-label="Drawing style">
            <label class="tool-label" for="drawSize">Stroke</label>
            <input id="drawSize" class="tool-range" type="range" min="1" max="16" step="1" value="2" />
            <input id="drawColor" class="tool-color" type="color" value="#1f1f1f" />
        </div>

        <div id="textControls" class="tool-group" aria-label="Text style">
            <label class="tool-label" for="textFont">Text</label>
            <select id="textFont" class="tool-select">
                <option value="plex">Plex</option>
                <option value="serif">Serif</option>
                <option value="mono">Mono</option>
                <option value="comic">Casual</option>
            </select>
            <input id="textSize" class="tool-range" type="range" min="12" max="52" step="1" value="18" />
            <input id="textColor" class="tool-color" type="color" value="#1f1f1f" />
        </div>

        <button id="clearBtn" class="tool-btn danger">Clear</button>
    </div>

    <main id="board" class="board" aria-label="Editable board"></main>

    <script src="/app.js"></script>
</body>

</html>
